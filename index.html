<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Header: Greeting Widget -->
  <header class="header card">
    <div class="greeting-left">
      <div id="clock" class="clock">00:00:00</div>
      <div id="greeting" class="greeting">Selamat Datang</div>
      <div class="name-input-row">
        <input type="text" id="nameInput" class="name-input" placeholder="Masukkan nama Anda..." maxlength="40" />
        <button id="saveNameBtn" class="btn btn-sm">Simpan</button>
      </div>
    </div>
    <div class="header-right">
      <button id="themeToggle" class="btn btn-icon" aria-label="Toggle tema">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <main class="main-grid">
    <!-- Focus Timer Card -->
    <section class="card timer-card">
      <h2 class="card-title">⏱ Focus Timer</h2>
      <div id="timerDisplay" class="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timerStart" class="btn btn-primary">Start</button>
        <button id="timerStop" class="btn btn-secondary">Stop</button>
        <button id="timerReset" class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <!-- To-Do List Card -->
    <section class="card todo-card">
      <h2 class="card-title">✅ To-Do List</h2>
      <div class="task-input-row">
        <input type="text" id="taskInput" class="task-input" placeholder="Tambah task baru..." maxlength="200" />
        <button id="addTaskBtn" class="btn btn-primary btn-sm">+</button>
      </div>
      <ul id="taskList" class="task-list"></ul>
    </section>

    <!-- Quick Links Card -->
    <section class="card links-card">
      <h2 class="card-title">🔗 Quick Links</h2>
      <div class="link-input-row">
        <input type="text" id="linkNameInput" class="link-input" placeholder="Nama (opsional)" maxlength="60" />
        <input type="text" id="linkUrlInput" class="link-input" placeholder="URL (wajib)" maxlength="500" />
        <button id="addLinkBtn" class="btn btn-primary btn-sm">+</button>
      </div>
      <div id="linkList" class="link-list"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
